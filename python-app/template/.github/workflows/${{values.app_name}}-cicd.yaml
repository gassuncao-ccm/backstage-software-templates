name: ${{values.app_name}}-cicd

on:
  push:
    paths:
      - src/**
    branches:
      - master

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Shorten commit id
        shell: bash
        run: |
          echo "COMMIT_ID=${GITHUB_SHA::6}" >> "$GITHUB_ENV"
      -
        name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ '${{ secrets.DOCKERHUB_USERNAME }}' }}
          password: ${{ '${{ secrets.DOCKERHUB_TOKEN }}' }}
      -
        name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          tags: gassuncao01/${{values.app_name}}:${{ '${{ env.COMMIT_ID }}' }}
    outputs:
      commit_id: ${{ '${{ env.COMMIT_ID }}' }}

  cd:
    needs: ci
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v3

      - name: Modify values file
        shell: bash
        run: |
          echo ${{ '${{needs.ci.outputs.commit_id}}' }}
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip python3-venv

          python3 -m venv venv
          . venv/bin/activate
          pip install yq
          yq -Yi '.image.tag = "${{ '${{needs.ci.outputs.commit_id}}' }}"' charts/${{values.app_name}}/values-${{values.app_env}}.yaml

      - name: Commit changes
        uses: EndBug/add-and-commit@v9
        with:
          message: 'Updates values.yaml with commit ${{ '${{needs.ci.outputs.commit_id}}' }}'


      - name: Install argocd
        shell: bash
        run: |
          curl -ksSL -o argocd https://argodc-argocd-server.argocd/download/argocd-linux-arm64
          chmod +x argocd
          sudo mv ./argocd /usr/bin/argocd

      - name: Ensure argocd repo and app
        shell: bash
        run: |
          # Creates the argocd repo
          repo='https://github.com/gabriel-assuncao-056/${{values.app_name}}.git'
          argocd repo list | grep -q "$repo" || argocd repo add "$repo"

          # Creates the argocd app
          argocd app get ${{values.app_name}} || argocd app create ${{values.app_name}} \
            --repo $repo \
            --path charts/app \
            --dest-namespace ${{ env.namespace }} \
            --dest-server https://kubernetes.default.svc \
            --values values-${{ inputs.environment }}.yaml \
            --revision master \
            --sync-policy auto \
            --sync-option CreateNamespace=true

      - name: Argocd app sync
        shell: bash
        run: |
           argocd login argodc-argocd-server.argocd \
           --insecure \
           --grpc-web \
           --username admin \
           --password ${{ '${{ secrets.ARGOCD_PASSWORD }}' }}
           argocd app sync ${{values.app_name}}
           argocd app wait ${{values.app_name}} --timeout 180